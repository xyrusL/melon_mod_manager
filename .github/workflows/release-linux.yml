name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing git tag to release (example: v1.7.5)'
        required: true
        type: string

concurrency:
  group: release-linux-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-upload-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve App Version
        id: meta
        shell: bash
        run: |
          dispatch_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || '' }}"
          if [[ -z "$dispatch_tag" ]]; then
            dispatch_tag="${{ github.ref_name }}"
          fi
          dart tool/release_metadata.dart --tag "$dispatch_tag" --github-output "$GITHUB_OUTPUT"

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Ensure Linux Runner Exists
        shell: bash
        run: |
          if [[ -f linux/CMakeLists.txt ]]; then
            echo "Linux runner already present."
            exit 0
          fi

          flutter create --platforms=linux .

          if [[ -f test/widget_test.dart ]]; then
            rm test/widget_test.dart
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run High-Value Tests
        run: >
          flutter test
          test/release_metadata_test.dart
          test/version_label_test.dart
          test/error_reporter_test.dart
          test/modrinth_api_client_test.dart
          test/modrinth_repository_impl_test.dart
          test/minecraft_path_service_test.dart
          test/dependency_resolver_service_test.dart
          test/modrinth_search_dialog_offline_test.dart
          test/modrinth_search_dialog_dependency_preview_test.dart

      - name: Run Full Test Suite
        run: flutter test

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Create Linux Archive
        id: linux_asset
        shell: bash
        run: |
          app_version="${{ steps.meta.outputs.app_version }}"
          bundle_dir="build/linux/x64/release/bundle"
          if [[ ! -d "$bundle_dir" ]]; then
            echo "Linux release output not found at $bundle_dir"
            exit 1
          fi
          asset_name="MelonModManager-Linux-Setup-$app_version.tar.gz"
          tar -C "$bundle_dir" -czf "$asset_name" .
          echo "asset_file=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 Checksums
        id: checksums
        shell: bash
        run: |
          asset="${{ steps.linux_asset.outputs.asset_file }}"
          checksum_file="SHA256SUMS-linux.txt"
          sha256sum "$asset" > "$checksum_file"
          echo "checksums_file=$checksum_file" >> "$GITHUB_OUTPUT"

      - name: Upload Linux Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          overwrite_files: true
          files: |
            ${{ steps.linux_asset.outputs.asset_file }}
            ${{ steps.checksums.outputs.checksums_file }}
